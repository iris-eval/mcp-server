<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="#030712"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <!-- Iris logo -->
  <circle cx="640" cy="200" r="52" stroke="#6366f1" stroke-width="3.5" fill="none" opacity="0.5"/>
  <circle cx="640" cy="200" r="35" stroke="#6366f1" stroke-width="3" fill="none" opacity="0.7"/>
  <circle cx="640" cy="200" r="18" fill="#6366f1"/>
  <circle cx="640" cy="200" r="7" fill="#030712"/>
  <!-- Title -->
  <text x="640" y="310" text-anchor="middle" fill="#e0e0f0" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700">Iris</text>
  <!-- Subtitle -->
  <text x="640" y="365" text-anchor="middle" fill="#8888aa" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500">MCP-Native Agent Eval &amp; Observability</text>
  <!-- Tagline -->
  <text x="640" y="415" text-anchor="middle" fill="#6366f1" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400">See what your AI agents are actually doing.</text>
  <!-- Install command -->
  <rect x="430" y="455" width="420" height="44" rx="8" fill="#111827" stroke="#2d2d4a" stroke-width="1"/>
  <text x="640" y="483" text-anchor="middle" fill="#818cf8" font-family="monospace, 'Courier New'" font-size="17">npx @iris-eval/mcp-server</text>
  <!-- URL -->
  <text x="640" y="555" text-anchor="middle" fill="#4b5563" font-family="system-ui, -apple-system, sans-serif" font-size="16">iris-eval.com</text>
  <!-- Open Source badge -->
  <rect x="562" y="570" width="156" height="28" rx="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="640" y="589" text-anchor="middle" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" opacity="0.8">Open Source &#x2022; MIT</text>
</svg>
