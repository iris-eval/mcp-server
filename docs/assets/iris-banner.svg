<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- Dark background -->
  <rect width="1500" height="500" fill="#0f0f1a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Decorative iris circles - left -->
  <circle cx="120" cy="250" r="180" stroke="#14b8a6" stroke-width="2" opacity="0.08"/>
  <circle cx="120" cy="250" r="130" stroke="#14b8a6" stroke-width="1.5" opacity="0.06"/>
  <circle cx="120" cy="250" r="80" fill="#14b8a6" opacity="0.03"/>

  <!-- Decorative iris circles - right -->
  <circle cx="1380" cy="250" r="200" stroke="#14b8a6" stroke-width="2" opacity="0.08"/>
  <circle cx="1380" cy="250" r="150" stroke="#14b8a6" stroke-width="1.5" opacity="0.06"/>
  <circle cx="1380" cy="250" r="100" fill="#14b8a6" opacity="0.03"/>

  <!-- Logo mark -->
  <circle cx="560" cy="250" r="48" stroke="#14b8a6" stroke-width="4"/>
  <circle cx="560" cy="250" r="34" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <circle cx="560" cy="250" r="20" fill="#14b8a6" opacity="0.3"/>
  <circle cx="560" cy="250" r="10" fill="#14b8a6"/>

  <!-- "Iris" text -->
  <text x="630" y="265" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="2">Iris</text>

  <!-- Tagline -->
  <text x="560" y="330" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#a5a5c0" letter-spacing="1">The Agent Eval Standard for MCP</text>

  <!-- Accent line -->
  <rect x="560" y="185" width="300" height="2" fill="#14b8a6" opacity="0.4" rx="1"/>
  <rect x="560" y="350" width="300" height="2" fill="#14b8a6" opacity="0.4" rx="1"/>
</svg>
