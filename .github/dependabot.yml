version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "typescript"
        versions: [">=6.0.0"]  # Blocked by @typescript-eslint peer deps (see #58)
    groups:
      linting:
        patterns:
          - "@typescript-eslint/*"
          - "eslint*"
          - "prettier"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(website)"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0"]  # Blocked by eslint-config-next plugin peer deps (see #54)
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(dashboard)"
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      docker:
        patterns:
          - "docker/*"
      github:
        patterns:
          - "actions/*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
    ignore:
      # Node major bumps need manual review — Dependabot doesn't distinguish
      # LTS (even majors) from Current (odd majors). Iris production runtime
      # stays on the latest Active LTS. Patch + minor bumps within an LTS
      # major still flow through Dependabot.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
