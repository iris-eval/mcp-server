name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: bash scripts/check-version.sh
      - run: bash scripts/check-product-claims.sh
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      # npm install (not ci) because lockfile is generated on Windows and
      # rolldown/emnapi transitive optional deps for Linux aren't captured.
      # Versions are constrained by ^carets in dashboard/package.json.
      # See memory: reference_rolldown_lockfile_trap.md
      - run: cd dashboard && npm install --no-audit --no-fund && npm run typecheck && npm run lint && npm test
      # Storybook smoke (audit item #11): build catalog to catch broken
      # stories before they ship. No pixel regression yet — Chromatic/
      # lost-pixel vendor choice is a separate founder decision.
      - run: cd dashboard && npm run build-storybook

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: cd dashboard && npm install --no-audit --no-fund && npm run build
      - name: Bundle size budget gate
        # Fails if dashboard JS/CSS exceeds the declared budget. Raising
        # budgets requires an explicit commit editing
        # scripts/check-bundle-size.mjs with justification.
        run: node scripts/check-bundle-size.mjs
      - name: Verify package integrity
        run: |
          test -f dist/dashboard/server.js || (echo "FATAL: dist/dashboard/server.js missing after build" && exit 1)
          test -f dist/dashboard/index.html || (echo "FATAL: dist/dashboard/index.html missing after build" && exit 1)
          test -f dist/index.js || (echo "FATAL: dist/index.js missing after build" && exit 1)
          node dist/index.js --help > /dev/null 2>&1
          echo "Package integrity check passed"

  # Smoke-build the Dockerfile on every PR. The host build (`build` job)
  # passes whenever tsc + vite succeed, but the Docker image runs tsc inside
  # a context that excludes hidden/un-COPY'd files. The v0.4.1 incident
  # shipped npm but not Docker because a dead-code import of `.claims.json`
  # typechecked on host (file present in repo) but failed in Docker (file
  # not COPY'd into builder stage). This gate runs single-arch (linux/amd64)
  # with gha cache so it stays under ~2min on warm runs.
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Smoke build (single-arch, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: cd dashboard && npm install --no-audit --no-fund && npm run build
      - name: Install Playwright browsers (Chromium + Firefox)
        # WebKit on Linux is NOT Safari (Safari uses Apple's WebKit,
        # macOS-only). We run Chromium + Firefox for real evergreen
        # coverage; Safari-real would require macOS CI as a later
        # decision. See playwright.config.ts for the full rationale.
        run: npx playwright install --with-deps chromium firefox
      - name: Run Playwright E2E (Chromium + Firefox)
        run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
